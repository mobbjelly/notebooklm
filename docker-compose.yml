services:
  backend:
    build:
      context: ./backend
    env_file: ./backend/.env
    environment:
      - CORS_ORIGINS=http://localhost:80,http://localhost
    volumes:
      - backend_data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
